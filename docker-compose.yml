services:

  postgres:
    image: postgres:16-alpine
    container_name: taskflow_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       taskflow_db
      POSTGRES_USER:     taskflow_user
      POSTGRES_PASSWORD: taskflow_pass
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow_user -d taskflow_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: taskflow_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskflow_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV:                 production
      PORT:                     5000
      DATABASE_URL:             postgresql://taskflow_user:taskflow_pass@postgres:5432/taskflow_db
      DB_SSL:                   "false"
      JWT_SECRET:               TF_Jwt$3cr3t_K3y_Pr0d_2026_AlphaBetaGamma_XYZ9
      JWT_EXPIRES_IN:           7d
      JWT_REFRESH_SECRET:       TF_R3fr3sh$3cr3t_K3y_Pr0d_2026_DeltaEpsilonZeta_ABC7
      JWT_REFRESH_EXPIRES_IN:   30d
      ALLOWED_ORIGINS:          http://localhost:3000,http://localhost:5500,http://localhost:5000
      RATE_LIMIT_WINDOW_MS:     900000
      RATE_LIMIT_MAX:           100
    ports:
      - "5000:5000"
    volumes:
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    image: nginx:alpine
    container_name: taskflow_frontend
    restart: unless-stopped
    depends_on:
      - api
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"

volumes:
  pg_data:
